version: '3.9'

services:
  server:
    image: localhost/buyer-portal-server:latest
    container_name: buyer-portal-server
    restart: unless-stopped
    build: ./server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    depends_on:
      db:
        condition: service_healthy

  app:
    image: localhost/buyer-portal-app:latest
    container_name: buyer-portal-app
    restart: unless-stopped
    build: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"
    depends_on:
      - server
  db:
    image: postgres:17-alpine
    container_name: Buyer_database
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./server/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./server/src/config/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5


